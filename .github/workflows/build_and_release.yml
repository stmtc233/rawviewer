name: Build and Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v1.0.0)'
        required: true
        default: 'v1.0.0'

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows
        run: flutter build windows --release

      - name: Zip Windows build
        run: |
          if (Test-Path "build\windows\x64\runner\Release") {
            Compress-Archive -Path "build\windows\x64\runner\Release\*" -DestinationPath "rawviewer-windows-${{ github.event.inputs.version }}.zip"
          } elseif (Test-Path "build\windows\runner\Release") {
            Compress-Archive -Path "build\windows\runner\Release\*" -DestinationPath "rawviewer-windows-${{ github.event.inputs.version }}.zip"
          } else {
            Write-Error "Could not find Windows build output directory"
            exit 1
          }

      - name: Upload Windows Build
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: rawviewer-windows-${{ github.event.inputs.version }}.zip

  build-macos:
    name: Build macOS Universal
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Enable macOS desktop
        run: flutter config --enable-macos-desktop

      - name: Install dependencies
        run: flutter pub get

      - name: Precache macOS artifacts
        run: flutter precache --macos

      - name: Build macOS
        run: flutter build macos --release

      - name: Verify macOS universal binaries
        run: |
          APP_BINARY="build/macos/Build/Products/Release/rawviewer.app/Contents/MacOS/rawviewer"
          LIB_BINARY="build/macos/Build/Products/Release/rawviewer.app/Contents/Frameworks/libnative_lib.dylib"

          for BINARY in "$APP_BINARY" "$LIB_BINARY"; do
            if [ ! -f "$BINARY" ]; then
              echo "Expected binary not found: $BINARY"
              exit 1
            fi

            lipo -info "$BINARY"
            ARCHS="$(lipo -archs "$BINARY")"
            if [[ "$ARCHS" != *"arm64"* || "$ARCHS" != *"x86_64"* ]]; then
              echo "Expected a universal binary containing arm64 and x86_64, got: $ARCHS"
              exit 1
            fi
          done

      - name: Zip macOS build
        run: |
          APP_PATH="build/macos/Build/Products/Release/rawviewer.app"
          ZIP_PATH="rawviewer-macos-${{ github.event.inputs.version }}.zip"
          if [ ! -d "$APP_PATH" ]; then
            echo "Could not find macOS app bundle at $APP_PATH"
            exit 1
          fi
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "$ZIP_PATH"

      - name: Upload macOS Build
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: rawviewer-macos-${{ github.event.inputs.version }}.zip

  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build Android APK
        run: flutter build apk --release

      - name: Rename APK
        run: mv build/app/outputs/flutter-apk/app-release.apk rawviewer-android-${{ github.event.inputs.version }}.apk

      - name: Upload Android Build
        uses: actions/upload-artifact@v4
        with:
          name: android-build
          path: rawviewer-android-${{ github.event.inputs.version }}.apk

  release:
    name: Create Release
    needs: [build-windows, build-macos, build-android]
    runs-on: ubuntu-latest
    steps:
      - name: Download Windows Build
        uses: actions/download-artifact@v4
        with:
          name: windows-build

      - name: Download macOS Build
        uses: actions/download-artifact@v4
        with:
          name: macos-build

      - name: Download Android Build
        uses: actions/download-artifact@v4
        with:
          name: android-build

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: Release ${{ github.event.inputs.version }}
          files: |
            rawviewer-windows-${{ github.event.inputs.version }}.zip
            rawviewer-macos-${{ github.event.inputs.version }}.zip
            rawviewer-android-${{ github.event.inputs.version }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
